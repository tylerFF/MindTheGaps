name = "mtg-quiz-webhook"
main = "src/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Secrets (set via `wrangler secret put` or Cloudflare dashboard):
# HUBSPOT_API_KEY      — HubSpot private app token
# RESEND_API_KEY       — Resend email API key (for quiz results email)
# FROM_EMAIL           — Sender address, e.g. "MindtheGaps <notifications@mindthegaps.biz>"
# STRIPE_CHECKOUT_URL  — Stripe checkout link for scan booking CTA in email

[vars]
# Set RESULTS_PAGE_URL to the live results page URL in production
# RESULTS_PAGE_URL = "https://yourdomain.com/results/"

[[kv_namespaces]]
binding = "MTG_RESULTS_CACHE"
id = "e55d117319de4c65a1d0edff2f5e3c5b"
